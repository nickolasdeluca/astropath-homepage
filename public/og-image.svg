<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09080a"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#c8a84b" fill-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Radial glows -->
  <radialGradient id="glowLeft" cx="20%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowRight" cx="80%" cy="40%" r="45%">
    <stop offset="0%" stop-color="#c8a84b" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#c8a84b" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>

  <!-- Large gear watermark -->
  <text x="600" y="380" font-size="560" text-anchor="middle" dominant-baseline="middle"
        fill="#c8a84b" fill-opacity="0.028" font-family="serif">⚙</text>

  <!-- Top border line -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#c8a84b" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Bottom border line -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#c8a84b" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Corner marks — top left -->
  <polyline points="80,60 80,90" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <polyline points="80,60 110,60" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <!-- Corner marks — top right -->
  <polyline points="1120,60 1120,90" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <polyline points="1120,60 1090,60" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <!-- Corner marks — bottom left -->
  <polyline points="80,570 80,540" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <polyline points="80,570 110,570" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <!-- Corner marks — bottom right -->
  <polyline points="1120,570 1120,540" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>
  <polyline points="1120,570 1090,570" stroke="#c8a84b" stroke-opacity="0.7" stroke-width="2" fill="none"/>

  <!-- Badge -->
  <rect x="430" y="140" width="340" height="28" rx="0"
        fill="#6b1010" fill-opacity="0.18" stroke="#8b1a1a" stroke-opacity="0.5" stroke-width="1"/>
  <text x="600" y="159" font-size="11" text-anchor="middle" dominant-baseline="middle"
        fill="#c05858" font-family="Georgia, serif" letter-spacing="4">
    MAGOS DIGITALIS · FORGE-ADEPT
  </text>

  <!-- Divider top -->
  <line x1="380" y1="190" x2="565" y2="190" stroke="#c8a84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="195" font-size="14" text-anchor="middle" dominant-baseline="middle"
        fill="#c8a84b" fill-opacity="0.6" font-family="serif">✦</text>
  <line x1="635" y1="190" x2="820" y2="190" stroke="#c8a84b" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Main heading -->
  <text x="600" y="290" font-size="72" font-weight="bold" text-anchor="middle" dominant-baseline="middle"
        fill="#e2dccb" font-family="Georgia, 'Palatino Linotype', serif" letter-spacing="8">
    NICKOLAS DE LUCA
  </text>
  <text x="600" y="370" font-size="72" font-weight="bold" text-anchor="middle" dominant-baseline="middle"
        fill="#e2dccb" font-family="Georgia, 'Palatino Linotype', serif" letter-spacing="8">
    ALBERTON
  </text>

  <!-- Divider bottom -->
  <line x1="380" y1="415" x2="565" y2="415" stroke="#c8a84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="420" font-size="14" text-anchor="middle" dominant-baseline="middle"
        fill="#c8a84b" fill-opacity="0.6" font-family="serif">✦</text>
  <line x1="635" y1="415" x2="820" y2="415" stroke="#c8a84b" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Sub-line -->
  <text x="600" y="460" font-size="16" text-anchor="middle" dominant-baseline="middle"
        fill="#c8a84b" font-family="Georgia, serif" letter-spacing="5">
    astropath.com.br
  </text>
</svg>
